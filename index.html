<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#120d08;--bg2:#1c1208;--bg3:#160f07;
  --border:#261808;--border2:#3a2510;
  --gold:#dbb96a;--gold2:#c9783a;
  --text:#e0cba8;--muted:#b89a70;
  --dim:#7a5a30;--dimmer:#6a4c20;--faint:#3a2510;
  --card:#1e1408;
}
html{scroll-behavior:smooth;height:100%}
body{background:var(--bg);color:var(--text);font-family:'EB Garamond',Georgia,serif;min-height:100vh;padding-bottom:80px;overscroll-behavior:none}
input,button,select,textarea{font-family:inherit}

/* ── Header ── */
#header{background:var(--bg2);border-bottom:1px solid var(--border2);padding:16px 18px 14px;position:sticky;top:0;z-index:100}
#header h1{font-family:'Playfair Display',Georgia,serif;font-size:20px;font-weight:700;color:var(--gold);letter-spacing:.02em;margin-bottom:1px}
.subtitle{font-size:11px;color:var(--dimmer);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px}
.stats-row{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:10px}
.stat-num{font-family:'Playfair Display',Georgia,serif;font-size:18px;font-weight:700;color:var(--gold);line-height:1}
.stat-label{font-size:10px;color:var(--dimmer);text-transform:uppercase;letter-spacing:.1em;margin-top:2px}
#pb-wrap{height:2px;background:#2a1a08;border-radius:2px;margin-bottom:10px}
#pb{height:2px;background:linear-gradient(90deg,#c9783a,#dbb96a);border-radius:2px;transition:width .4s ease}
#next-up{background:#2a1a08;border-radius:8px;padding:8px 12px;border-left:3px solid var(--gold2);font-size:13px;display:none}
#next-up .nl{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em}
#next-title{color:var(--gold)}
#next-author{color:var(--dim);font-style:italic}

/* ── Controls ── */
#controls{background:var(--bg3);border-bottom:1px solid var(--border);padding:12px 16px 10px}
#search{width:100%;background:var(--card);border:1px solid var(--border2);border-radius:8px;padding:10px 14px;color:var(--text);font-size:16px;outline:none;margin-bottom:10px}
#search::placeholder{color:var(--faint)}
.btn-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:8px}
.cat-btn,.filter-btn{border-radius:20px;padding:6px 13px;font-size:12px;cursor:pointer;border:1px solid var(--border2);background:var(--card);color:var(--dim);transition:all .15s;white-space:nowrap}
.filter-row{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.filter-btn{border-radius:6px;padding:5px 11px;background:transparent;color:var(--dimmer);border-color:var(--border)}
.filter-btn.active{background:#2a1a08;color:var(--gold);border-color:var(--faint)}
#shown-count{margin-left:auto;font-size:12px;color:var(--dimmer)}
#cat-drawer{display:none;flex-wrap:wrap;gap:6px;margin-bottom:8px}
#cat-drawer.open{display:flex}
.cat-sub-btn{border-radius:20px;padding:5px 11px;font-size:11px;cursor:pointer;border:1px solid;background:transparent;transition:all .15s}

/* ── Add Book Button ── */
#add-btn{
  position:fixed;bottom:24px;right:20px;z-index:200;
  background:var(--gold2);color:#fff;border:none;
  border-radius:50px;padding:14px 22px;
  font-size:15px;font-family:'EB Garamond',Georgia,serif;
  cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.5);
  display:flex;align-items:center;gap:8px;
  transition:transform .15s, box-shadow .15s;
}
#add-btn:active{transform:scale(.96);box-shadow:0 2px 10px rgba(0,0,0,.4)}

/* ── Modal ── */
#modal-overlay{
  display:none;position:fixed;inset:0;z-index:300;
  background:rgba(0,0,0,.7);backdrop-filter:blur(4px);
  align-items:flex-end;justify-content:center;
}
#modal-overlay.open{display:flex}
#modal{
  background:#1e1408;border-radius:20px 20px 0 0;
  border-top:1px solid var(--border2);
  width:100%;max-width:600px;padding:24px 20px 36px;
  animation:slideUp .25s ease;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
#modal h2{font-family:'Playfair Display',Georgia,serif;font-size:18px;color:var(--gold);margin-bottom:18px}
.modal-field{margin-bottom:14px}
.modal-label{font-size:11px;color:var(--dimmer);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;display:block}
.modal-input,.modal-select{
  width:100%;background:#120d08;border:1px solid var(--border2);
  border-radius:8px;padding:11px 14px;color:var(--text);
  font-size:16px;outline:none;
}
.modal-select{appearance:none;-webkit-appearance:none}
.modal-row{display:flex;gap:10px}
.modal-row .modal-field{flex:1}
.modal-btns{display:flex;gap:10px;margin-top:20px}
.modal-cancel{
  flex:1;background:transparent;border:1px solid var(--border2);
  border-radius:10px;padding:13px;color:var(--dim);font-size:15px;cursor:pointer;
}
.modal-save{
  flex:2;background:var(--gold2);border:none;
  border-radius:10px;padding:13px;color:#fff;font-size:15px;
  font-weight:700;cursor:pointer;
}
.modal-close{position:absolute;top:18px;right:20px;background:none;border:none;color:var(--dim);font-size:22px;cursor:pointer;line-height:1}

/* ── List ── */
#list{padding:0 14px}
.book-row{display:flex;align-items:flex-start;gap:10px;padding:13px 0;border-bottom:1px solid #1e1208;transition:opacity .2s}
.book-row.hidden{display:none}
.book-num{font-size:12px;font-weight:700;width:28px;flex-shrink:0;text-align:right;padding-top:3px;color:#3a2a18;font-family:'EB Garamond',Georgia,serif;transition:color .2s}
.book-row.owned .book-num{color:var(--gold2)}
.book-check{width:20px;height:20px;margin-top:2px;flex-shrink:0;accent-color:var(--gold2);cursor:pointer}
.book-body{flex:1;min-width:0}
.book-title{font-size:15px;font-weight:400;color:var(--muted);line-height:1.35;transition:color .2s}
.book-row.owned .book-title{font-weight:700;color:var(--gold)}
.book-author{font-size:13px;color:var(--dim);margin-top:2px;font-style:italic}
.cat-tag{display:inline-block;margin-top:5px;border-radius:4px;font-size:10px;padding:2px 7px;letter-spacing:.05em;border:1px solid}
.custom-tag{display:inline-block;margin-top:5px;margin-left:5px;border-radius:4px;font-size:10px;padding:2px 7px;letter-spacing:.05em;border:1px solid #dbb96a44;color:var(--gold);background:#dbb96a10}
.book-fields{display:none;gap:8px;margin-top:10px;flex-wrap:wrap}
.book-row.owned .book-fields{display:flex}
.field-wrap{flex:1;min-width:100px}
.field-label{font-size:10px;color:var(--dimmer);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px}
.field-input{width:100%;background:var(--card);border:1px solid var(--border2);border-radius:6px;padding:7px 10px;color:var(--text);font-size:16px;font-family:'EB Garamond',Georgia,serif;outline:none;color-scheme:dark}
.delete-btn{background:none;border:none;color:#5a3020;font-size:18px;cursor:pointer;padding:2px 4px;margin-top:8px;display:inline-block}
.delete-btn:active{color:#d46b6b}

/* ── Empty state ── */
#empty-state{display:none;text-align:center;padding:60px 24px;color:var(--faint)}
#empty-state p{font-size:16px;font-style:italic;margin-bottom:8px}
#empty-state small{font-size:13px;color:#2a1a08}
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <h1>Jacob's Reading List</h1>
  <div class="subtitle" id="subtitle-line">146 books · suggested purchase order</div>
  <div class="stats-row">
    <div><div class="stat-num" id="stat-owned">0</div><div class="stat-label">Owned</div></div>
    <div><div class="stat-num" id="stat-left">0</div><div class="stat-label">To Find</div></div>
    <div><div class="stat-num" id="stat-spent">$0.00</div><div class="stat-label">Spent AUD</div></div>
    <div><div class="stat-num" id="stat-pct">0%</div><div class="stat-label">Done</div></div>
  </div>
  <div id="pb-wrap"><div id="pb" style="width:0%"></div></div>
  <div id="next-up">
    <div class="nl">Next to grab →</div>
    <span id="next-title"></span><span id="next-author"></span>
  </div>
</div>

<!-- CONTROLS -->
<div id="controls">
  <input id="search" type="search" placeholder="Search title or author…" autocomplete="off" autocorrect="off" spellcheck="false">
  <div class="btn-row">
    <button class="cat-btn active" id="btn-all" style="background:var(--gold2);color:#fff;border-color:var(--gold2)">All</button>
    <button class="cat-btn" id="cat-toggle">Filter by category ▾</button>
  </div>
  <div id="cat-drawer"></div>
  <div class="filter-row">
    <button class="filter-btn active" data-filter="all">All books</button>
    <button class="filter-btn" data-filter="unowned">Still need</button>
    <button class="filter-btn" data-filter="owned">✓ Owned</button>
    <span id="shown-count"></span>
  </div>
</div>

<!-- LIST -->
<div id="list"></div>
<div id="empty-state">
  <p>No books match.</p>
  <small>Try a different search or filter.</small>
</div>

<!-- ADD BOOK BUTTON -->
<button id="add-btn">
  <span style="font-size:20px;line-height:1">+</span> Add a book
</button>

<!-- ADD BOOK MODAL -->
<div id="modal-overlay">
  <div id="modal" style="position:relative">
    <button class="modal-close" id="modal-close">✕</button>
    <h2>Add a Book</h2>
    <div class="modal-field">
      <label class="modal-label" for="m-title">Title *</label>
      <input class="modal-input" id="m-title" type="text" placeholder="e.g. The Wind-Up Bird Chronicle">
    </div>
    <div class="modal-field">
      <label class="modal-label" for="m-author">Author *</label>
      <input class="modal-input" id="m-author" type="text" placeholder="e.g. Haruki Murakami">
    </div>
    <div class="modal-field">
      <label class="modal-label" for="m-cat">Category</label>
      <select class="modal-select" id="m-cat">
        <option value="Personal Development">Personal Development</option>
        <option value="Philosophy">Philosophy</option>
        <option value="World Fiction">World Fiction</option>
        <option value="Poetry">Poetry</option>
        <option value="Memoir & Essay">Memoir & Essay</option>
        <option value="Korean Literature">Korean Literature</option>
        <option value="Japanese Literature" selected>Japanese Literature</option>
        <option value="Language Learning">Language Learning</option>
        <option value="Other">Other</option>
      </select>
    </div>
    <div class="modal-row">
      <div class="modal-field">
        <label class="modal-label" for="m-price">Price Paid (AUD $)</label>
        <input class="modal-input" id="m-price" type="number" min="0" step="0.01" placeholder="0.00" inputmode="decimal">
      </div>
      <div class="modal-field">
        <label class="modal-label" for="m-date">Date Purchased</label>
        <input class="modal-input" id="m-date" type="date" style="color-scheme:dark">
      </div>
    </div>
    <div id="modal-err" style="color:#d46b6b;font-size:13px;display:none;margin-top:-4px;margin-bottom:10px">Please enter at least a title and author.</div>
    <div class="modal-btns">
      <button class="modal-cancel" id="modal-cancel">Cancel</button>
      <button class="modal-save" id="modal-save">Add to list</button>
    </div>
  </div>
</div>

const CAT_COLOR = {
  "Personal Development":"#d4845a","Philosophy":"#9b7fd4","World Fiction":"#4aaa82",
  "Poetry":"#d46b8e","Memoir & Essay":"#5a9fd4","Korean Literature":"#d46b6b",
  "Japanese Literature":"#7ab85a","Language Learning":"#c8a84b","Other":"#dbb96a"
};
const CATS = Object.keys(CAT_COLOR);

const POS = {};
ORDER.forEach((id,i) => POS[id] = i+1);

const BOOK_MAP = {};
BOOKS.forEach(b => BOOK_MAP[b.id] = b);

// ─────────────────────────────────────────────────────────────────────────────
// STATE  (localStorage)
// ─────────────────────────────────────────────────────────────────────────────
const KEY = 'jacobbooks_v2';

function loadState() {
  try {
    const s = localStorage.getItem(KEY);
    if (s) return JSON.parse(s);
  } catch(e){}
  // fresh state — nothing owned, no prices
  const out = { books:{}, custom:[] };
  BOOKS.forEach(b => { out.books[b.id] = {owned:false, price:'', date:''}; });
  return out;
}

function save() {
  try { localStorage.setItem(KEY, JSON.stringify(state)); } catch(e){}
}

let state = loadState();

// Ensure all list books exist in state (in case of future updates)
BOOKS.forEach(b => {
  if (!state.books[b.id]) state.books[b.id] = {owned:false, price:'', date:''};
});
if (!state.custom) state.custom = [];

// ─────────────────────────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────────────────────────
function totalBooks() { return BOOKS.length + state.custom.length; }
function ownedCount()  {
  const listOwned   = BOOKS.filter(b => state.books[b.id]?.owned).length;
  const customOwned = state.custom.filter(b => b.owned).length;
  return listOwned + customOwned;
}
function totalSpent() {
  let s = 0;
  BOOKS.forEach(b => { const p=parseFloat(state.books[b.id]?.price||'0'); if(!isNaN(p)) s+=p; });
  state.custom.forEach(b => { const p=parseFloat(b.price||'0'); if(!isNaN(p)) s+=p; });
  return s;
}

function updateStats() {
  const owned = ownedCount();
  const total = totalBooks();
  const pct   = total ? Math.round(owned/total*100) : 0;
  const spent = totalSpent();

  document.getElementById('stat-owned').textContent = owned;
  document.getElementById('stat-left').textContent  = total - owned;
  document.getElementById('stat-spent').textContent = '$'+spent.toFixed(2);
  document.getElementById('stat-pct').textContent   = pct+'%';
  document.getElementById('pb').style.width         = pct+'%';
  document.getElementById('subtitle-line').textContent = total+' books · suggested purchase order';

  // Next up — first unowned in ORDER, then custom at end
  const nextListId = ORDER.find(id => state.books[id] && !state.books[id].owned);
  const nextEl = document.getElementById('next-up');
  if (nextListId) {
    const nb = BOOK_MAP[nextListId];
    document.getElementById('next-title').textContent  = '#'+POS[nextListId]+' '+nb.title;
    document.getElementById('next-author').textContent = ' · '+nb.author;
    nextEl.style.display = 'block';
  } else {
    nextEl.style.display = 'none';
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// BUILD LIST
// ─────────────────────────────────────────────────────────────────────────────
function buildList() {
  const list = document.getElementById('list');

  // List books in order
  const listHTML = ORDER.map(id => {
    const b = BOOK_MAP[id];
    if (!b) return '';
    const st  = state.books[id] || {owned:false,price:'',date:''};
    const col = CAT_COLOR[b.cat] || '#c9783a';
    return bookRowHTML(id, b.title, b.author, b.cat, col, POS[id], st, false);
  }).join('');

  // Custom books appended after
  const customHTML = state.custom.map((b,i) => {
    const col = CAT_COLOR[b.cat] || CAT_COLOR['Other'];
    return bookRowHTML('custom-'+i, b.title, b.author, b.cat, col, '★', {owned:b.owned,price:b.price||'',date:b.date||''}, true);
  }).join('');

  list.innerHTML = listHTML + customHTML;
}

function bookRowHTML(id, title, author, cat, col, num, st, isCustom) {
  return `<div class="book-row${st.owned?' owned':''}" data-id="${id}" data-cat="${cat}">
    <div class="book-num">${num}</div>
    <input class="book-check" type="checkbox" data-id="${id}" ${st.owned?'checked':''}>
    <div class="book-body">
      <div class="book-title">${esc(title)}</div>
      <div class="book-author">${esc(author)}</div>
      <span class="cat-tag" style="color:${col};border-color:${col}44;background:${col}1a">${esc(cat)}</span>
      ${isCustom ? '<span class="custom-tag">My addition</span>' : ''}
      <div class="book-fields">
        <div class="field-wrap">
          <div class="field-label">AUD $ Paid</div>
          <input class="field-input price-input" type="number" min="0" step="0.01"
            placeholder="0.00" value="${esc(st.price)}" data-id="${id}" data-field="price" inputmode="decimal">
        </div>
        <div class="field-wrap">
          <div class="field-label">Date Purchased</div>
          <input class="field-input date-input" type="date"
            value="${esc(st.date)}" data-id="${id}" data-field="date">
        </div>
        ${isCustom ? `<div style="width:100%;text-align:right"><button class="delete-btn" data-id="${id}" title="Remove book">🗑 Remove</button></div>` : ''}
      </div>
    </div>
  </div>`;
}

function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─────────────────────────────────────────────────────────────────────────────
// FILTERS
// ─────────────────────────────────────────────────────────────────────────────
let activeCat    = 'All';
let activeFilter = 'all';
let searchQuery  = '';

function applyFilters() {
  const rows = document.querySelectorAll('.book-row');
  const q    = searchQuery.toLowerCase();
  let shown  = 0;

  rows.forEach(row => {
    const id   = row.dataset.id;
    const cat  = row.dataset.cat;
    const isCustom = id.startsWith('custom-');
    const title  = row.querySelector('.book-title')?.textContent?.toLowerCase() || '';
    const author = row.querySelector('.book-author')?.textContent?.toLowerCase() || '';
    const owned  = isCustom
      ? state.custom[parseInt(id.split('-')[1])]?.owned
      : state.books[id]?.owned;

    const catOk    = activeCat === 'All' || cat === activeCat;
    const filterOk = activeFilter === 'all'
      || (activeFilter === 'owned'   && owned)
      || (activeFilter === 'unowned' && !owned);
    const searchOk = !q || title.includes(q) || author.includes(q);

    if (catOk && filterOk && searchOk) { row.classList.remove('hidden'); shown++; }
    else                               { row.classList.add('hidden'); }
  });

  document.getElementById('shown-count').textContent = shown+' shown';
  document.getElementById('empty-state').style.display = shown === 0 ? 'block' : 'none';
}

// ─────────────────────────────────────────────────────────────────────────────
// CATEGORY DRAWER
// ─────────────────────────────────────────────────────────────────────────────
function buildCatDrawer() {
  document.getElementById('cat-drawer').innerHTML = CATS.map(c => {
    const col = CAT_COLOR[c];
    return `<button class="cat-sub-btn" data-cat="${c}"
      style="color:${col};border-color:${col}66;background:${col}18">${c}</button>`;
  }).join('');
}

function setCatUI(cat) {
  activeCat = cat;
  const allBtn = document.getElementById('btn-all');
  const togBtn = document.getElementById('cat-toggle');
  const col    = CAT_COLOR[cat] || '#c9783a';
  if (cat === 'All') {
    allBtn.style.cssText = 'background:var(--gold2);color:#fff;border-color:var(--gold2)';
    togBtn.style.cssText = 'background:var(--card);color:var(--dim);border-color:var(--border2)';
    togBtn.textContent   = 'Filter by category ▾';
  } else {
    allBtn.style.cssText = 'background:var(--card);color:var(--dim);border-color:var(--border2)';
    togBtn.style.background   = col;
    togBtn.style.color        = '#fff';
    togBtn.style.borderColor  = col;
    togBtn.textContent        = cat;
  }
  document.querySelectorAll('.cat-sub-btn').forEach(btn => {
    const c  = btn.dataset.cat;
    const bc = CAT_COLOR[c];
    btn.style.background = c === cat ? bc : bc+'18';
    btn.style.color      = c === cat ? '#fff' : bc;
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// EVENTS — LIST
// ─────────────────────────────────────────────────────────────────────────────
document.getElementById('list').addEventListener('change', e => {
  const el = e.target;
  const id = el.dataset.id;
  if (!id) return;
  const isCustom = id.startsWith('custom-');
  const idx      = isCustom ? parseInt(id.split('-')[1]) : null;

  if (el.classList.contains('book-check')) {
    if (isCustom) state.custom[idx].owned = el.checked;
    else          state.books[id].owned   = el.checked;
    const row = el.closest('.book-row');
    el.checked ? row.classList.add('owned') : row.classList.remove('owned');
    save(); updateStats(); applyFilters();

  } else if (el.dataset.field) {
    const field = el.dataset.field;
    if (isCustom) state.custom[idx][field] = el.value;
    else          state.books[id][field]   = el.value;
    save();
    if (field === 'price') updateStats();
  }
});

document.getElementById('list').addEventListener('click', e => {
  const btn = e.target.closest('.delete-btn');
  if (!btn) return;
  const id  = btn.dataset.id;
  const idx = parseInt(id.split('-')[1]);
  if (!confirm('Remove this book from your list?')) return;
  state.custom.splice(idx, 1);
  save();
  buildList();
  updateStats();
  applyFilters();
});

// ─────────────────────────────────────────────────────────────────────────────
// EVENTS — CONTROLS
// ─────────────────────────────────────────────────────────────────────────────
document.getElementById('btn-all').addEventListener('click', () => {
  setCatUI('All');
  document.getElementById('cat-drawer').classList.remove('open');
  applyFilters();
});
document.getElementById('cat-toggle').addEventListener('click', () => {
  document.getElementById('cat-drawer').classList.toggle('open');
});
document.getElementById('cat-drawer').addEventListener('click', e => {
  const btn = e.target.closest('.cat-sub-btn');
  if (!btn) return;
  setCatUI(btn.dataset.cat);
  document.getElementById('cat-drawer').classList.remove('open');
  applyFilters();
});
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    activeFilter = btn.dataset.filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyFilters();
  });
});
document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value;
  applyFilters();
});

// ─────────────────────────────────────────────────────────────────────────────
// MODAL — ADD BOOK
// ─────────────────────────────────────────────────────────────────────────────
function openModal()  { document.getElementById('modal-overlay').classList.add('open'); document.getElementById('m-title').focus(); }
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.getElementById('m-title').value  = '';
  document.getElementById('m-author').value = '';
  document.getElementById('m-price').value  = '';
  document.getElementById('m-date').value   = '';
  document.getElementById('modal-err').style.display = 'none';
}

document.getElementById('add-btn').addEventListener('click', openModal);
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-cancel').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

document.getElementById('modal-save').addEventListener('click', () => {
  const title  = document.getElementById('m-title').value.trim();
  const author = document.getElementById('m-author').value.trim();
  if (!title || !author) {
    document.getElementById('modal-err').style.display = 'block';
    return;
  }
  const book = {
    title, author,
    cat:   document.getElementById('m-cat').value,
    owned: true,
    price: document.getElementById('m-price').value,
    date:  document.getElementById('m-date').value
  };
  state.custom.push(book);
  save();
  buildList();
  updateStats();
  applyFilters();
  closeModal();
});

// ─────────────────────────────────────────────────────────────────────────────
// SERVICE WORKER
// ─────────────────────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────────────────
buildList();
buildCatDrawer();
updateStats();
applyFilters();
</script>
</body>
